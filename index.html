<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Home</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* Reset */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Inter', sans-serif; line-height: 1.6; color: #333; }

    /* GrapesJS Editor Styles */
    * { box-sizing: border-box; } body {margin: 0;}.hero-section{display:flex;padding:20px;min-height:400px;text-align:center;align-items:center;border-radius:8px;justify-content:center;background-color:#f3f4f6;}.hero-title{color:#111827;font-size:3rem;font-weight:bold;margin-bottom:1rem;}.hero-subtitle{color:#4b5563;margin:0 auto;font-size:1.25rem;max-width:600px;}#ifxd{color:#6b7280;font-size:0.875rem;margin-top:20px;}
  </style>
</head>
<body>
  <body><div class="hero-section"><h1 class="hero-title">Welcome to Your New Site</h1><p class="hero-subtitle">This is your homepage. You can use the visual editor to customize this content or import an existing HTML template.</p><p id="ifxd">Note: The GrapesJS Site Editor supports Tailwind CSS classes out of the box!</p></div></body>
</body>
</html>
